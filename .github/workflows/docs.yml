name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"

jobs:
  deploy-docs:
    name: Build & deploy VitePress → Deno Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "inertia-deno-docs"   # nom du projet sur dash.deno.com
          entrypoint: "serve.ts"
          root: "docs"
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
